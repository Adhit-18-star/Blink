<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blink</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#071426;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:#0f1f38;
            padding:40px;
            border-radius:20px;
            width:90%;
            max-width:400px;
            text-align:center;
            border:1px solid #334155;
        }

        h1{
            margin-bottom:10px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            background:#1e293b;
            color:white;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#1e5eff;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#3b75ff;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
        }

        .footer{
            margin-top:15px;
            color:#94a3b8;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🚀 Blink</h1>
    <p>Welcome back</p>

    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        New here? <a href="/register">Create account</a>
    </div>

    <div class="footer">
        Built with ❤️ by Adhit
    </div>

</div>

</body>
</html>
