<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blink</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #071426;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card{
            background: #0f1f38;
            padding: 45px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
            border: 1px solid #334155;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h1{
            font-size: 42px;
            margin-bottom: 10px;
        }

        p{
            color: #b7c4d6;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn{
            display: block;
            text-decoration: none;
            background: #1e5eff;
            color: white;
            padding: 14px;
            margin: 12px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover{
            background: #3b75ff;
        }

        .register{
            background: #22c55e;
        }

        .register:hover{
            background: #16a34a;
        }

        .footer{
            margin-top: 20px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="logo">
    <img src="/static/logo.png" height="50">
    Blink
</div>

<div class="navbar">

<div class="card">

    <h1>🚀 Blink</h1>

    <p>
        Connect. Chat. Share.
        <br><br>
        Fast, secure and simple messaging.
    </p>

    <a href="/login" class="btn">
        Login
    </a>

    <a href="/register" class="btn register">
        Create Account
    </a>

    <div class="footer">
        Built with ❤️ by Adhit
    </div>

</div>

</body>
</html>
