<!DOCTYPE html>
<html>
<head>
    <title>{{ case[1] }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#071426;color:white;font-family:Arial;margin:0;">

<div style="background:#0f1f38;padding:15px 25px;">
    <h2>🚀 Blink</h2>
</div>

<div style="max-width:900px;margin:auto;padding:30px;">

    <div style="background:#0f1f38;border:1px solid #334155;border-radius:15px;padding:20px;">

        <h1>{{ case[1] }}</h1>

        <p>{{ case[2] }}</p>

        <h2>🔍 Clues</h2>

        {% for clue in clues %}
            <p>• {{ clue }}</p>
        {% endfor %}

        <h2>👥 Suspects</h2>

        <form action="/accuse/{{ case[0] }}" method="post">

            {% for suspect in suspects %}

                <div style="background:#071426;padding:12px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">

                    <span>{{ suspect }}</span>

                    <button
                        type="submit"
                        name="suspect"
                        value="{{ suspect }}"
                        style="background:#1e5eff;color:white;border:none;padding:10px 15px;border-radius:10px;cursor:pointer;">
                        Accuse
                    </button>

                </div>

            {% endfor %}

        </form>

    </div>

</div>

</body>
</html>
