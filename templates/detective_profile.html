<!DOCTYPE html>
<html>
<head>
    <title>Detective Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#071426;
            color:white;
        }

        .navbar{
            background:#0f1f38;
            padding:15px 25px;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:30px;
        }

        .card{
            background:#0f1f38;
            border:1px solid #334155;
            border-radius:15px;
            padding:25px;
        }

        .bar{
            width:100%;
            height:25px;
            background:#334155;
            border-radius:20px;
            overflow:hidden;
        }

        .fill{
            height:100%;
            background:#1e5eff;
        }

        .btn{
            background:#1e5eff;
            color:white;
            text-decoration:none;
            padding:10px 18px;
            border-radius:10px;
            display:inline-block;
            margin-top:15px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">🚀 Blink</div>
</div>

<div class="container">

    <div class="card">

        <h1>🕵️ {{ username }}</h1>

        <h2>{{ level }}</h2>

        <p>🏆 Total XP: {{ xp }}</p>

        <p>Next Level: {{ next_xp }} XP</p>

        <div class="bar">
            <div class="fill" style="width:{{ progress }}%;"></div>
        </div>

        <br>

        <a href="/detective" class="btn">
            Detective Cases
        </a>

    </div>

</div>

</body>
</html>
