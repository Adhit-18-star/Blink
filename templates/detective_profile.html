<!DOCTYPE html>
<html>
<head>
    <title>Detective Profile - Blink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#071426;
            color:white;
        }

        .navbar{
            background:#0f1f38;
            padding:18px 25px;
            border-bottom:1px solid #334155;
        }

        .logo{
            font-size:26px;
            font-weight:bold;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:30px;
        }

        .card{
            background:#0f1f38;
            border:1px solid #334155;
            border-radius:18px;
            padding:30px;
            box-shadow:0 0 20px rgba(0,0,0,.25);
        }

        h1{
            margin-bottom:10px;
        }

        h2{
            color:#4da3ff;
            margin-bottom:20px;
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:18px;
            margin:30px 0;
        }

        .box{
            background:#16253d;
            border-radius:12px;
            padding:18px;
            text-align:center;
        }

        .box h3{
            font-size:16px;
            color:#9ec9ff;
            margin-bottom:10px;
        }

        .box p{
            font-size:28px;
            font-weight:bold;
        }

        .bar{
            width:100%;
            height:24px;
            background:#334155;
            border-radius:30px;
            overflow:hidden;
            margin-top:10px;
        }

        .fill{
            height:100%;
            background:#1e5eff;
            transition:.5s;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:12px 22px;
            background:#1e5eff;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
        }

        .btn:hover{
            background:#3974ff;
        }

    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">🚀 Blink</div>
</div>

<div class="container">

    <div class="card">

        <h1>🕵️ {{ username }}</h1>

        <h2>{{ level }}</h2>

        <p><b>Total XP:</b> {{ xp }}</p>

        <p><b>Next Level:</b> {{ next_xp }} XP</p>

        <div class="bar">
            <div class="fill" style="width:{{ progress }}%;"></div>
        </div>

        <div class="stats">

            <div class="box">
                <h3>⚡ Blinks</h3>
                <p>{{ blinks }}</p>
            </div>

            <div class="box">
                <h3>💎 Gems</h3>
                <p>{{ gems }}</p>
            </div>

            <div class="box">
                <h3>🪙 Coins</h3>
                <p>{{ coins }}</p>
            </div>

            <div class="box">
                <h3>🔥 Login Streak</h3>
                <p>{{ login_streak }}</p>
            </div>

        </div>

        <a href="/detective" class="btn">
            🕵️ Detective Cases
        </a>

    </div>

</div>

</body>
</html>
