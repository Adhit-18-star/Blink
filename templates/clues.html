<!DOCTYPE html>
<html>
<head>
    <title>Clues - Blink</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#071426;
            color:white;
        }

        .navbar{
            background:#0f1f38;
            padding:15px 25px;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:30px;
        }

        .card{
            background:#0f1f38;
            border:1px solid #334155;
            border-radius:15px;
            padding:20px;
            margin-bottom:15px;
        }

        .btn{
            background:#1e5eff;
            color:white;
            text-decoration:none;
            padding:10px 18px;
            border-radius:10px;
            display:inline-block;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">🚀 Blink</div>
</div>

<div class="container">

    <h1>🔍 Clues</h1>

    {% for clue in clues %}
        <div class="card">
            {{ clue }}
        </div>
    {% endfor %}

    <a href="/detective/suspects" class="btn">
        View Suspects 👥
    </a>

</div>

</body>
</html>
