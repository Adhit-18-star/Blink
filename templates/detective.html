<!DOCTYPE html>
<html>
<head>
    <title>Detective Game - Blink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#071426;
            color:white;
        }

        .navbar{
            background:#0f1f38;
            padding:15px 25px;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:30px;
        }

        .card{
            background:#0f1f38;
            border:1px solid #334155;
            border-radius:15px;
            padding:25px;
        }

        .btn{
            background:#1e5eff;
            color:white;
            text-decoration:none;
            padding:12px 20px;
            border-radius:10px;
            display:inline-block;
            margin-right:10px;
            margin-top:15px;
        }

        .story{
            color:#cbd5e1;
            line-height:1.7;
            margin-top:15px;
        }
    </style>

</head>
<body>

<div class="navbar">
    <div class="logo">🚀 Blink</div>
</div>

<div class="container">

    <div class="card">

        <h1>🕵️ The Missing Cricket Bat</h1>

        <div class="story">
            One day before the school final, the captain's lucky cricket bat
            disappeared from the sports room.

            <br><br>

            Three suspects have been identified.

            <br><br>

            Your mission is to examine the clues and discover who took the bat.
        </div>

        <a href="/detective/clues" class="btn">
            Show Clues 🔍
        </a>

        <a href="/detective/suspects" class="btn">
            View Suspects 👥
        </a>

    </div>

</div>

</body>
</html>
