<!DOCTYPE html>

<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

```

    body{
        font-family: Arial;
        background:#0f172a;
        color:white;
        margin:0;
        padding:20px;
    }

    .chat-box{
        height:400px;
        overflow-y:auto;

```

</head>

<body>

<h2>Chat with {{ friend }}</h2>

<div id="imageViewer"
     style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;">

```
<img id="fullImage"
     style="max-width:95%;max-height:95%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
```

</div>

<div class="chat-box" id="messages">

```
{% for id, sender, msg, timestamp in messages %}

    <div class="msg">

        <div class="sender">{{ sender }}</div>

        {% if msg.startswith("/uploads/") %}
            <img
                src="{{ msg }}"
                style="cursor:pointer;"
                onclick="openImage('{{ msg }}')"
            >
        {% else %}
            <div>{{ msg }}</div>
        {% endif %}

        <div class="time">
            {{ timestamp }}
        </div>

        <a href="/delete-message/{{ id }}/{{ friend }}">
            <button class="delete-btn">Delete</button>
        </a>

    </div>

{% endfor %}
```

</div>

<form method="post" action="/chat/{{ friend }}">
    <input type="text" name="message" placeholder="Type message..." required>
    <button type="submit">Send</button>
</form>

<form method="post" action="/upload/{{ friend }}" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">📸 Send Image</button>
</form>

<br>

<a href="/friends"><button>Back</button></a> <a href="/camera/{{ friend }}"><button>📸 Open Camera</button></a> <a href="/filters/{{ friend }}"><button>Filters Camera</button></a>

<script>
function openImage(src) {
    document.getElementById("fullImage").src = src;
    document.getElementById("imageViewer").style.display = "block";
}

document.getElementById("imageViewer").onclick = function() {
    this.style.display = "none";
};
</script>

<script>
async function loadMessages() {
    const res = await fetch(window.location.href, { cache: "no-store" });
    const html = await res.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const newMessages = doc.querySelector("#messages");
    const currentMessages = document.querySelector("#messages");

    if (newMessages && currentMessages) {
        currentMessages.innerHTML = newMessages.innerHTML;
    }
}

setInterval(loadMessages, 2000);
</script>

</body>
</html>
