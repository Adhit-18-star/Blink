<!DOCTYPE html>
<html>
<head>
    <title>Suspects - Blink</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#071426;
            color:white;
        }

        .navbar{
            background:#0f1f38;
            padding:15px 25px;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:30px;
        }

        .suspect{
            background:#0f1f38;
            border:1px solid #334155;
            border-radius:15px;
            padding:20px;
            margin-bottom:15px;
        }

        button{
            background:#1e5eff;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:10px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">🚀 Blink</div>
</div>

<div class="container">

    <h1>👥 Suspects</h1>

    <form action="/detective/result" method="post">

        <div class="suspect">
            <h3>Arjun</h3>
            <button type="submit" name="suspect" value="Arjun">
                Accuse Arjun
            </button>
        </div>

        <div class="suspect">
            <h3>Watchman Suresh</h3>
            <button type="submit" name="suspect" value="Watchman">
                Accuse Watchman
            </button>
        </div>

        <div class="suspect">
            <h3>Coach Ravi</h3>
            <button type="submit" name="suspect" value="Coach">
                Accuse Coach
            </button>
        </div>

    </form>

</div>

</body>
</html>
